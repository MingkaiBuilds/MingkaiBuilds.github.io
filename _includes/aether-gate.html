<div class="aether-gate">
  <!-- All visual layers are decorative -->
  <div class="aether-gate__scene" aria-hidden="true">
    <!-- Dithers live on __scene::before and ::after -->
    <!-- Stars -->
    <div class="aether-stars"></div>
    <!-- Light rays -->
    <div class="aether-rays"></div>
    <!-- Pixel clouds -->
    <div class="aether-cloud aether-cloud--1"></div>
    <div class="aether-cloud aether-cloud--2"></div>
    <div class="aether-cloud aether-cloud--3"></div>
    <div class="aether-cloud aether-cloud--4"></div>
    <!-- Horizon glow pool -->
    <div class="aether-glow"></div>
  </div>
  <!-- Wordmark: real text, readable by screen readers -->
  <span class="aether-wordmark">Aether</span>
</div>
