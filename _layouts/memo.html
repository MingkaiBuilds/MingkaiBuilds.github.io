---
layout: default
---

{% assign words = content | number_of_words %}
{% assign read_time = words | divided_by: 200 | plus: 1 %}

<article class="memo-layout">
  <div class="container">

    <header class="memo-header">
      <div class="memo-header-meta">
        <span class="category-chip">{{ page.category }}</span>
        <time class="memo-date" datetime="{{ page.date | date: '%Y-%m-%d' }}">
          {{ page.date | date: "%B %d, %Y" }}
        </time>
      </div>

      <h1 class="memo-title">{{ page.title }}</h1>

      <p class="memo-read-time">{{ read_time }} min read</p>
    </header>

    <div class="memo-body prose">
      {{ content }}
    </div>

  </div>
</article>
