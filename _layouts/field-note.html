---
layout: default
---

<article class="field-note-layout">
  <div class="container">

    <header class="field-note-header">
      <time class="field-note-date" datetime="{{ page.date | date: '%Y-%m-%d' }}">
        {{ page.date | date: "%Y.%m.%d" }}
      </time>
      <h1 class="field-note-title">{{ page.title }}</h1>
    </header>

    <div class="field-note-body prose">
      {{ content }}
    </div>

  </div>
</article>
